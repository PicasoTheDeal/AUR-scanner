name: Update Feed

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch and sanitize feed
        run: |
          cat << 'EOF' > script.py
          import sys
          import re
          import urllib.request
          from urllib.error import URLError, HTTPError

          url = 'https://md.archlinux.org/s/SxbqukK6IA/download'

          try:
              req = urllib.request.Request(
                  url,
                  headers={'User-Agent': 'Mozilla/5.0 (compatible; GitHub Action; +https://github.com/your-repo)'}
              )
              with urllib.request.urlopen(req, timeout=15) as resp:
                  data = resp.read().decode('utf-8')
          except (URLError, HTTPError):
              sys.exit(1)

          valid_entries = set()
          pattern = re.compile(r'^[a-z0-9_\.\+\-]+$')

          for line in data.splitlines():
              line = line.strip()
              if not line or line.startswith('#'):
                  continue
              if pattern.fullmatch(line):
                  valid_entries.add(line)

          if len(valid_entries) == 0:
              sys.exit(1)

          sorted_entries = sorted(valid_entries)
          with open('packages.txt', 'w') as f:
              f.write("# Local Threat Signature Baseline\n")
              for entry in sorted_entries:
                  f.write(entry + '\n')
          EOF
          python3 script.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add packages.txt
          
          if ! git diff --cached --quiet; then
            git commit -m "Update packages.txt from feed"
            git push origin HEAD:main
          fi
