name: Update Threat Feed

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit-and-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate or Initialize Local Manifest
        run: |
          cat << 'EOF' > validate.py
          import re
          import sys
          from pathlib import Path

          p = Path("packages.txt")
          if not p.exists():
              p.write_text("# Local Threat Signature Baseline\n")
              sys.exit(0)

          lines = p.read_text().splitlines()
          for l in lines:
              l = l.strip()
              if not l or l.startswith("#"): 
                  continue
              if not re.match(r"^[a-z0-9\-_\+\.]+$", l):
                  sys.exit(1)
          EOF
          python3 validate.py

      - name: Check for Changes and Commit
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add packages.txt
          if ! git diff --cached --quiet; then
            git commit -m "Automated synchronization of threat feed baseline"
            git push origin main
          fi
